<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Observatoire ICC — PACA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Grotesk', sans-serif; background: #0d0d1a; color: #e0e0e0; min-height: 100vh; padding: 24px; }
    h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .subtitle { color: #555; font-size: 11px; font-family: 'IBM Plex Mono', monospace; margin-bottom: 24px; }
    .label { color: #3d5af1; font-size: 10px; letter-spacing: 4px; margin-bottom: 4px; }
    button { padding: 10px 22px; border: 1px solid #3d5af1; background: transparent; color: #7986cb; border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 12px; transition: all .2s; margin-right: 8px; margin-bottom: 8px; }
    button:hover, button.active { background: #3d5af1; color: #fff; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress-bar { height: 4px; background: #1a1a2e; border-radius: 2px; overflow: hidden; margin: 10px 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #3d5af1, #42a5f5); transition: width .3s; border-radius: 2px; }
    .progress-text { font-size: 10px; color: #555; font-family: 'IBM Plex Mono', monospace; }
    .grand-total { color: #ffcc02; font-size: 13px; font-weight: 700; margin: 12px 0; }
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #1e1e3a; margin-top: 16px; }
    table { border-collapse: collapse; width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
    th, td { padding: 6px 10px; border: 1px solid #1e1e3a; text-align: center; }
    th { background: #12122a; color: #7986cb; font-weight: 600; position: sticky; top: 0; z-index: 2; }
    th.col-naf { text-align: left; min-width: 260px; position: sticky; left: 0; z-index: 3; }
    td.col-naf { text-align: left; position: sticky; left: 0; background: #0d0d1a; z-index: 1; }
    tr:hover td { filter: brightness(1.3); }
    .sect-row td { background: #12122a !important; color: #7986cb; font-weight: 700; font-size: 10px; letter-spacing: 2px; }
    .total-row td { background: #1a1a2e !important; color: #ffcc02; font-weight: 700; border-top: 2px solid #3d5af1; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 9px; font-weight: 700; margin-right: 6px; font-family: 'IBM Plex Mono', monospace; }
    .empty-state { text-align: center; padding: 60px; color: #333; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 12px; }
    .empty-state small { font-size: 10px; color: #444; display: block; margin-top: 8px; }
    .error-msg { color: #e74c3c; font-size: 11px; font-family: 'IBM Plex Mono', monospace; margin-top: 8px; }
    footer { margin-top: 20px; font-size: 9px; color: #333; text-align: right; font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>
<div class="label">OBSERVATOIRE ICC — RÉGION PACA</div>
<h1>Étab
